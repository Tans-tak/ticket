<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>电影票根</title>

<!-- 思源黑体 Regular -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">

<style>

/* =========================
   香萃潮汐宋体
   请放入同目录：
   XiangCuiSong.ttf
========================= */

@font-face{
    font-family:"XiangCuiSong";
    src:url("香萃潮汐宋 W15.ttf");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:
    "Noto Sans SC",
    sans-serif;
}

/* =========================
   票根容器
========================= */

.wrapper{
    width:min(95vw, 1400px);
}

.ticket{
    position:relative;

    width:100%;

    aspect-ratio:1920/724;

    overflow:hidden;

    border-radius:0;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

.ticket img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

/* =========================
   全局文字层级
========================= */

.actor,
.time,
.hall,
.seat,
.order{
    position:absolute;
    z-index:99;
}

/* =========================
   领衔出演
========================= */

.actor{

    top:120px;
    left:120px;

    font-family:
    "XiangCuiSong",
    serif;

    font-size:clamp(28px, 2vw, 54px);

    color:#fff;

    letter-spacing:2px;

    text-shadow:
    0 0px 0px rgba(0,0,0,.75);
}

/* =========================
   时间
========================= */

.time{

    top:295px;
    left:120px;

    font-size:clamp(18px, 1.1vw, 30px);

    line-height:1.8;

    color:#fff;

    font-weight:400;

    text-shadow:
    0 0px 0px rgba(0,0,0,.75);
}

/* =========================
   放映厅
========================= */

.hall{

    top:412px;
    left:120px;

    font-size:clamp(20px, 1.2vw,36px);

    color:#fff;

    letter-spacing:1px;

    font-weight:400;

    text-shadow:
    0 0px 0px rgba(0,0,0,.7);
}

/* =========================
   座位号
========================= */

.seat{

    right:105px;
    top:420px;

    transform:translateY(-50%);

    text-align:right;

    color:#ffffff;

    font-weight:400;

    font-size:clamp(26px, 2.3vw, 64px);

    line-height:1.5;

    letter-spacing:2px;

    text-shadow:
    0 0 0px rgba(0,0,0,.9),
    0 0px 0px rgba(0,0,0,.9);
}

/* =========================
   票号
========================= */

.order{

    top:450px;
    left:120px;

    color:#ddd;

    font-size:clamp(14px, .9vw, 24px);

    font-weight:400;

    letter-spacing:1px;

    text-shadow:
    0 0px 0px rgba(0,0,0,.75);
}

/* =========================
   按钮
========================= */

button{

    width:100%;

    margin-top:22px;

    border:none;

    border-radius:16px;

    padding:16px;

    background:#4b84c9;

    color:#000;

    font-size:18px;

    font-family:
    "Noto Sans SC",
    sans-serif;

    font-weight:400;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.tip{

    margin-top:16px;

    text-align:center;

    color:#888;

    font-size:14px;

    font-weight:400;
}


/* =========================
   手机竖屏适配
========================= */

@media screen and (orientation:portrait){

    body{

        padding:0;

        margin:0;

        min-height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        background:#000;

        overflow-x:hidden;
    }

    /* =========================
       页面整体居中
    ========================= */

    .wrapper{

        width:100vw;

        min-height:100vh;

        display:flex;

        flex-direction:column;

        justify-content:center;

        align-items:center;
    }

    /* =========================
       票根整体缩放
    ========================= */

    .ticket{

        width:100vw;

        max-width:100vw;

        aspect-ratio:1920 / 724;

        position:relative;

        overflow:hidden;
    }

    /* =========================
       按钮宽度
    ========================= */

    button{

        width:92vw;

        max-width:600px;

        margin-top:20px;

        margin-bottom:30px;

        font-size:15px;

        padding:14px;
    }

    /* =========================
       文字按比例缩放
    ========================= */

    .actor{

        left:6.25vw;
        top:6.25vw;

        font-size:2.8vw;
    }

    .time{

        left:6.25vw;
        top:15.3vw;

        font-size:1.45vw;
    }

    .hall{

        left:6.25vw;
        top:21.5vw;

        font-size:1.6vw;
    }

    .seat{

        right:5.5vw;
        top:21.8vw;

        font-size:3vw;

        transform:none;
    }

    .order{

        left:6.25vw;
        top:23.5vw;

        font-size:1.15vw;
    }
}


</style>
</head>

<body>

<div class="wrapper">

    <div class="ticket" id="ticket">

        <!-- =========================
             替换你的票根模板
             尺寸：1920 × 724
        ========================== -->

        <img src="图层 3.png">

        <!-- 标题 -->

        <div class="actor">
            冰穗华&夏天y领衔出演
        </div>

        <!-- 时间 -->

        <div class="time">
            2026年5月20日 00:00<br>
            至<br>
            2026年5月21日 00:00
        </div>

        <!-- 放映厅 -->

        <div class="hall">
            青红放映厅
        </div>

        <!-- 座位 -->

        <div class="seat" id="seat">
        </div>

        <!-- 票号 -->

        <div class="order">
            No.110120
        </div>

    </div>

    <button onclick="saveImage()">
        保存票根图片
    </button>

</div>

<!-- html2canvas -->

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

/* =========================
   随机座位
========================= */

function randomSeat(){

    const row =
        Math.floor(Math.random() * 20) + 1;


    const seat =
        Math.floor(Math.random() * 20) + 1;

    return {
        row,
        seat
    };
}

/* =========================
   自动生成
========================= */

const result = randomSeat();

document.getElementById("seat").innerHTML =
`
ROW ${result.row}<br>
SEAT ${result.seat}
`;

/* =========================
   保存图片
========================= */

function saveImage(){

    html2canvas(
        document.getElementById("ticket"),
        {
            useCORS:true,
            scale:2
        }
    ).then(canvas => {

        const link =
            document.createElement("a");

        link.download =
            "ticket.png";

        link.href =
            canvas.toDataURL();

        link.click();
    });
}

</script>

</body>
</html>
