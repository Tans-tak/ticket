<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>电影票根</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">

<style>

/* =========================
   自定义字体
========================= */

@font-face{
    font-family:"XiangCuiSong";
    src:url("香萃潮汐宋 W15.ttf");
}

/* =========================
   基础
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:"Noto Sans SC",sans-serif;
}

/* =========================
   容器
========================= */

.wrapper{
    width:min(95vw, 1600px);
}

/* =========================
   票根（2160×815）
========================= */

.ticket{
    position:relative;
    width:100%;
    aspect-ratio:2160 / 815;
    overflow:hidden;
}

.ticket img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* =========================
   统一文字层
========================= */

.actor,
.time,
.hall,
.seat,
.order{
    position:absolute;
    z-index:99;
}

/* =========================================================
   PC端坐标（基于 2160×815 设计稿）
   = 原1920体系 × 1.125 已全部换算
========================================================= */

/* =========================
   标题
========================= */

.actor{
    top:135px;
    left:135px;
    font-family:"XiangCuiSong",serif;
    font-size:56px;
    color:#fff;
    letter-spacing:2px;
}

/* =========================
   时间
========================= */

.time{
    top:332px;
    left:135px;
    font-size:30px;
    line-height:1.8;
    color:#fff;
}

/* =========================
   放映厅
========================= */

.hall{
    top:465px;
    left:135px;
    font-size:36px;
    color:#fff;
}

/* =========================
   座位
========================= */

.seat{
    top:472px;
    right:118px;
    text-align:right;
    font-size:64px;
    color:#fff;
}

/* =========================
   票号
========================= */

.order{
    top:505px;
    left:135px;
    font-size:24px;
    color:#ddd;
}

/* =========================
   按钮
========================= */

button{
    width:100%;
    margin-top:22px;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#4b84c9;
    color:#000;
    font-size:18px;
    cursor:pointer;
}

/* =========================
   手机竖屏适配（vw版）
   基准：1080 × 2374
========================= */

@media screen and (orientation:portrait){

    body{
        margin:0;
        padding:0;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#000;
        overflow:hidden;
    }

    .wrapper{
        width:100vw;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
    }

    /* =========================
       票根：按1080宽度计算
    ========================= */

    .ticket{
        width:100vw;
        aspect-ratio:2160 / 815;
        position:relative;
    }

    /* =========================
       vw换算规则
       1vw = 10.8px（基于1080）
       原设计2160 → 手机缩小2倍
    ========================= */

    /* 标题 */
    .actor{
        top:6.2vw;
        left:6.2vw;
        font-size:2.6vw;
    }

    /* 时间 */
    .time{
        top:15vw;
        left:6.2vw;
        font-size:1.4vw;
        line-height:1.7;
    }

    /* 放映厅 */
    .hall{
        top:21vw;
        left:6.2vw;
        font-size:1.6vw;
    }

    /* 座位 */
    .seat{
        top:21.5vw;
        right:5.5vw;
        font-size:3vw;
        text-align:right;
        transform:none;
    }

    /* 票号 */
    .order{
        top:23.5vw;
        left:6.2vw;
        font-size:1.1vw;
    }

    /* 按钮 */
    button{
        width:92vw;
        max-width:600px;
        margin-top:20px;
        margin-bottom:30px;
        font-size:15px;
        padding:14px;
    }
}
   
</style>
</head>

<body>

<div class="wrapper">

    <div class="ticket" id="ticket">

        <img src="图层 3.png">

        <div class="actor">冰穗华&夏天y领衔出演</div>

        <div class="time">
            2026年5月20日 00:00<br>
            至<br>
            2026年5月21日 00:00
        </div>

        <div class="hall">青红放映厅</div>

        <div class="seat" id="seat"></div>

        <div class="order">No.110120</div>

    </div>

    <button onclick="saveImage()">保存票根图片</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

function randomSeat(){

    return {
        row: Math.floor(Math.random()*20)+1,
        seat: Math.floor(Math.random()*20)+1
    };
}

const r = randomSeat();

document.getElementById("seat").innerHTML =
`ROW ${r.row}<br>SEAT ${r.seat}`;

function saveImage(){

    html2canvas(document.getElementById("ticket"),{
        useCORS:true,
        scale:2
    }).then(canvas=>{

        const a = document.createElement("a");
        a.download="ticket.png";
        a.href=canvas.toDataURL();
        a.click();
    });
}

</script>

</body>
</html>
