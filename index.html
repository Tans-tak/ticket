<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>电影票根</title>

<!-- 思源黑体 Regular -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">

<style>

/* =========================
   香萃潮汐宋体
   请放入同目录：
   XiangCuiSong.ttf
========================= */

@font-face{
    font-family:"XiangCuiSong";
    src:url("香萃潮汐宋 W15.ttf");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:
    "Noto Sans SC",
    sans-serif;
}

/* =========================
   票根容器
========================= */

.wrapper{
    width:min(95vw, 1400px);
}

.ticket{
    position:relative;

    width:100%;

    aspect-ratio:2160/815;

    overflow:hidden;

    border-radius:0;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

.ticket img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

/* =========================
   全局文字层级
========================= */

.actor,
.time,
.hall,
.seat,
.order{
    position:absolute;
    z-index:99;
}


/* =========================
   座位号
========================= */

.seat{

    right:105px;
    top:420px;

    transform:translateY(-50%);

    text-align:right;

    color:#ffffff;

    font-weight:400;

    font-size:clamp(26px, 2.3vw, 64px);

    font-family:"XiangCuiSong",
    sans-serif;

    line-height:1.5;

    letter-spacing:2px;

    text-shadow:
    0 0 0px rgba(0,0,0,.9),
    0 0px 0px rgba(0,0,0,.9);
}


/* =========================
   按钮
========================= */

button{

    width:100%;

    margin-top:22px;

    border:none;

    border-radius:16px;

    padding:16px;

    background:#4b84c9;

    color:#000;

    font-size:18px;

    font-family:
    "Noto Sans SC",
    sans-serif;

    font-weight:400;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.tip{

    margin-top:16px;

    text-align:center;

    color:#888;

    font-size:14px;

    font-weight:400;
}

/* =========================
   手机端：统一缩放（彻底解决错位）
========================= */

@media screen and (orientation:portrait){

    body{
        margin:0;
        padding:0;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#000;
        overflow:hidden;
    }

    .wrapper{
        width:100vw;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
    }

    /* 关键：固定设计稿比例 */
    .ticket{
        width:100vw;
        max-width:100vw;
        aspect-ratio:2160 / 815;
        position:relative;
        transform-origin:center;
    }

    /* =========================
       座位号
    ========================= */

    .seat{

        top:26.5vw;
        right:5.5vw;

        transform:none;

        font-size:3vw;

        line-height:1.4;
    }


    /* 按钮单独适配 */
    button{
        width:92vw;
        max-width:600px;
        margin-top:20px;
        margin-bottom:30px;
        font-size:15px;
        padding:14px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="ticket" id="ticket">

        <!-- =========================
             替换你的票根模板
             尺寸：1920 × 724
        ========================== -->

        <img src="图层 3.png">

          <!-- 座位 -->

        <div class="seat" id="seat">
        </div>

    </div>

    <button onclick="saveImage()">
        保存票根图片
    </button>

</div>

<!-- html2canvas -->

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

/* =========================
   随机座位
========================= */

function randomSeat(){

    const row =
        Math.floor(Math.random() * 20) + 1;


    const seat =
        Math.floor(Math.random() * 20) + 1;

    return {
        row,
        seat
    };
}

/* =========================
   自动生成
========================= */

const result = randomSeat();

document.getElementById("seat").innerHTML =
`
ROW ${result.row}<br>
SEAT ${result.seat}
`;

/* =========================
   保存图片
========================= */

function saveImage(){

    html2canvas(
        document.getElementById("ticket"),
        {
            useCORS:true,
            scale:2
        }
    ).then(canvas => {

        const link =
            document.createElement("a");

        link.download =
            "ticket.png";

        link.href =
            canvas.toDataURL();

        link.click();
    });
}

</script>

</body>
</html>
